<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyborgDev</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero {
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
    .hero p { color: var(--muted); max-width: 480px; margin-bottom: 2.5rem; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #0f0f11; }
    .btn-ghost { border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>

<header>
  <a href="index.html">CyborgDev</a>
  <nav>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </nav>
</header>

<div class="hero">
  <div class="badge">Studio</div>
  <h1>CyborgDev</h1>
  <p>We build AI-powered mobile applications that help people live better, smarter lives.</p>
  <div class="links">
    <a href="privacy.html" class="btn btn-primary">Privacy Policy</a>
    <a href="terms.html" class="btn btn-ghost">Terms of Service</a>
  </div>
</div>

<footer>
  <p>© 2026 CyborgDev &nbsp;·&nbsp;
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </p>
</footer>

</body>
</html>
